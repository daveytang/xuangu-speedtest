<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>API测试诊断</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #1a1a1a; color: #fff; }
    .test { margin: 20px 0; padding: 15px; background: #2a2a2a; border-radius: 8px; }
    .success { color: #10b981; }
    .error { color: #ef4444; }
    button { padding: 10px 20px; background: #3b82f6; color: white; border: none; border-radius: 6px; cursor: pointer; margin: 10px 5px; }
    button:hover { background: #2563eb; }
    pre { background: #1a1a1a; padding: 10px; border-radius: 4px; overflow-x: auto; }
  </style>
</head>
<body>
  <h1>🔍 API测试诊断</h1>

  <div class="test">
    <h3>1. 测试 Ping API</h3>
    <button onclick="testPing()">测试 /api/ping</button>
    <div id="ping-result"></div>
  </div>

  <div class="test">
    <h3>2. 测试 Download API (小包)</h3>
    <button onclick="testDownload(1024 * 1024)">测试 1MB 下载</button>
    <div id="download-result"></div>
  </div>

  <div class="test">
    <h3>3. 测试 Upload API</h3>
    <button onclick="testUpload()">测试 1MB 上传</button>
    <div id="upload-result"></div>
  </div>

  <div class="test">
    <h3>4. 测试 Meta API</h3>
    <button onclick="testMeta()">测试 /api/meta</button>
    <div id="meta-result"></div>
  </div>

  <script>
    async function testPing() {
      const result = document.getElementById('ping-result');
      result.innerHTML = '测试中...';

      try {
        const start = performance.now();
        const response = await fetch('/api/ping', { cache: 'no-store' });
        const data = await response.json();
        const duration = performance.now() - start;

        result.innerHTML = `<span class="success">✓ 成功</span><br>
          响应时间: ${duration.toFixed(2)}ms<br>
          服务器时间: ${data.t}<br>
          状态码: ${response.status}`;
      } catch (err) {
        result.innerHTML = `<span class="error">✗ 失败</span><br>错误: ${err.message}`;
      }
    }

    async function testDownload(bytes) {
      const result = document.getElementById('download-result');
      result.innerHTML = '测试中...';

      try {
        const start = performance.now();
        const response = await fetch(`/api/download?bytes=${bytes}`, { cache: 'no-store' });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const reader = response.body.getReader();
        let received = 0;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          received += value.length;
        }

        const duration = performance.now() - start;
        const mbps = (received * 8) / (duration * 1000);

        result.innerHTML = `<span class="success">✓ 成功</span><br>
          接收字节: ${received.toLocaleString()}<br>
          用时: ${duration.toFixed(2)}ms<br>
          速度: ${mbps.toFixed(2)} Mbps`;
      } catch (err) {
        result.innerHTML = `<span class="error">✗ 失败</span><br>错误: ${err.message}<br>
          <pre>${err.stack}</pre>`;
      }
    }

    async function testUpload() {
      const result = document.getElementById('upload-result');
      result.innerHTML = '测试中...';

      try {
        const data = new Uint8Array(1024 * 1024); // 1MB
        for (let i = 0; i < data.length; i++) {
          data[i] = Math.floor(Math.random() * 256);
        }

        const start = performance.now();
        const response = await fetch('/api/upload', {
          method: 'POST',
          body: data,
          headers: { 'Content-Type': 'application/octet-stream' }
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const json = await response.json();
        const duration = performance.now() - start;
        const mbps = (json.received * 8) / (duration * 1000);

        result.innerHTML = `<span class="success">✓ 成功</span><br>
          上传字节: ${json.received.toLocaleString()}<br>
          用时: ${duration.toFixed(2)}ms<br>
          速度: ${mbps.toFixed(2)} Mbps`;
      } catch (err) {
        result.innerHTML = `<span class="error">✗ 失败</span><br>错误: ${err.message}`;
      }
    }

    async function testMeta() {
      const result = document.getElementById('meta-result');
      result.innerHTML = '测试中...';

      try {
        const response = await fetch('/api/meta', { cache: 'no-store' });
        const data = await response.json();

        result.innerHTML = `<span class="success">✓ 成功</span><br>
          <pre>${JSON.stringify(data, null, 2)}</pre>`;
      } catch (err) {
        result.innerHTML = `<span class="error">✗ 失败</span><br>错误: ${err.message}`;
      }
    }
  </script>
</body>
</html>
